<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <title>vibe — terminal chrome wordmark</title>
  <!-- terminal window outline -->
  <rect x="40" y="20" width="720" height="160" rx="14"
        fill="none" stroke="#1A1A2E" stroke-width="3"/>
  <!-- title bar separator -->
  <line x1="40" y1="60" x2="760" y2="60" stroke="#1A1A2E" stroke-width="2"/>
  <!-- traffic-light dots: red, yellow, green -->
  <circle cx="75"  cy="42" r="10" fill="#FF4D4D"/>
  <circle cx="105" cy="42" r="10" fill="#FFD93D"/>
  <circle cx="135" cy="42" r="10" fill="#6BCB77"/>
  <!-- wordmark (scaled to fit terminal content area y=65..175) -->
  <!-- v -->
  <path d="M 253,88 L 288,175 L 323,88"
        fill="none" stroke="#1A1A2E" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- i stem -->
  <line x1="363" y1="115" x2="363" y2="175"
        stroke="#1A1A2E" stroke-width="24" stroke-linecap="round"/>
  <!-- i dot -->
  <circle cx="363" cy="88" r="12" fill="#1A1A2E"/>
  <!-- b stem -->
  <line x1="413" y1="65" x2="413" y2="175"
        stroke="#1A1A2E" stroke-width="24" stroke-linecap="round"/>
  <!-- b bowl -->
  <path d="M 413,120 C 474,120 474,175 413,175"
        fill="none" stroke="#1A1A2E" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- e arc -->
  <path d="M 545,146 A 32,32 0 1,0 530,173"
        fill="none" stroke="#1A1A2E" stroke-width="24" stroke-linecap="round"/>
  <!-- e crossbar -->
  <line x1="481" y1="146" x2="545" y2="146"
        stroke="#1A1A2E" stroke-width="24" stroke-linecap="round"/>
</svg>
